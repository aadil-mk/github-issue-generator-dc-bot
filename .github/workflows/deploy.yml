name: Deploy

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "Manual run"

jobs:
  build:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    env:
      # Secrets — set these under repo Settings > Secrets and variables > Actions > Secrets
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      GT_ACCESS_TOKEN: ${{ secrets.GT_ACCESS_TOKEN }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}

      # Variables — set these under repo Settings > Secrets and variables > Actions > Variables
      GUILD_ID: ${{ vars.GUILD_ID }}
      GT_USERNAME: ${{ vars.GT_USERNAME }}
      GT_REPOSITORY: ${{ vars.GT_REPOSITORY }}
      DEVELOPER_IDS: ${{ vars.DEVELOPER_IDS }}
      PREFIX: ${{ vars.PREFIX }}
      PORT: ${{ vars.PORT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck

      - name: Run build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: SSH & Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            bash << 'EOF'
            set -e

            cd /home/rws/bot/github-issue-bot

            echo "⬇️  Pulling latest changes..."
            git pull origin main

            echo "📦 Installing production dependencies..."
            npm ci --omit=dev

            echo "🔨 Building..."
            npm run build

            echo "♻️  Restarting with pm2..."
            pm2 restart github-issue-bot || pm2 start dist/index.js --name github-issue-bot

            echo "✅ Deploy complete!"
            EOF
