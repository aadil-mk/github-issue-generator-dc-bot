name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Adding environment variables
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          request_pty: true
          envs: BOT_TOKEN,GUILD_ID,GT_ACCESS_TOKEN,GT_USERNAME,GT_REPOSITORY,MONGODB_URI,DEVELOPER_IDS,PREFIX,PORT
          script: |
            bash -lc '
              cat > /home/rws/bot/github-issue-bot/.env << EOF
              BOT_TOKEN=$BOT_TOKEN
              GUILD_ID=$GUILD_ID
              GT_ACCESS_TOKEN=$GT_ACCESS_TOKEN
              GT_USERNAME=$GT_USERNAME
              GT_REPOSITORY=$GT_REPOSITORY
              MONGODB_URI=$MONGODB_URI
              DEVELOPER_IDS=$DEVELOPER_IDS
              PREFIX=$PREFIX
              PORT=$PORT
              EOF
            '
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GUILD_ID: ${{ vars.GUILD_ID }}
          GT_ACCESS_TOKEN: ${{ secrets.GT_ACCESS_TOKEN }}
          GT_USERNAME: ${{ vars.GT_USERNAME }}
          GT_REPOSITORY: ${{ vars.GT_REPOSITORY }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          DEVELOPER_IDS: ${{ vars.DEVELOPER_IDS }}
          PREFIX: ${{ vars.PREFIX }}
          PORT: ${{ vars.PORT }}

      - name: SSH & Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          request_pty: true
          script: |
            bash -lc '
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

              nvm use --lts

              cd /home/rws/bot/github-issue-bot

              git pull origin main
              npm ci
              npm run build

              pm2 restart github-issue-bot || pm2 start dist/index.js --name github-issue-bot
            '
